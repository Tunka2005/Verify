name: Trigger Railway Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway deploy hook
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL secret is not set."
            echo "Create a Railway Deploy Hook and add it as a GitHub repository secret."
            exit 1
          fi

          curl --fail --request POST "$RAILWAY_DEPLOY_HOOK_URL"
